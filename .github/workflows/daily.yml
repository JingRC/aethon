name: Daily Dual Digest

on:
  schedule:
    # Retry window: Beijing 8:00 AM → 8:30 AM, every 5 minutes
    # Only one email per day (cache sentinel blocks retries)
    - cron: '0 0 * * *'
    - cron: '5 0 * * *'
    - cron: '10 0 * * *'
    - cron: '15 0 * * *'
    - cron: '20 0 * * *'
    - cron: '25 0 * * *'
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'config.yml'

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Get today's date (Beijing time)
        id: date
        run: echo "today=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # Cache-based sentinel: restore at start, auto-save at end of job
      - name: Email sentinel cache
        id: sentinel
        uses: actions/cache@v4
        with:
          path: .email-sentinel
          key: daily-email-${{ steps.date.outputs.today }}

      # Schedule: skip if email already sent today
      # Manual dispatch: always run (bypass cache)
      - name: Skip — email already sent today
        if: steps.sentinel.outputs.cache-hit == 'true' && github.event_name == 'schedule'
        run: |
          echo "📬 Email already sent on ${{ steps.date.outputs.today }}, all done!"

      - uses: actions/setup-python@v5
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily digest
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: python main.py

      - name: Mark email as sent
        if: success() && (steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule')
        run: |
          mkdir -p .email-sentinel
          echo "${{ steps.date.outputs.today }}" > .email-sentinel/date
          echo "✅ Marked as sent — later cron runs will skip"

      - name: Deploy to GitHub Pages
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true
